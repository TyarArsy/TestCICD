name: Node.js CI Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run Tests
        run: ./node_modules/.bin/jest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy ke Vercel
        # Hanya akan berjalan setelah kamu klik 'Approve' di GitHub
        run: |
          npm install --global vercel
          vercel --prod --token ${{ secrets.Deployment }} --yes